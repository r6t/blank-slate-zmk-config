# Increase Bluetooth power to prevent missed/repeating/delayed keypresses
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Increase polling rate to 1kHz (zmk default: 125Hz)
CONFIG_USB_HID_POLL_INTERVAL_MS=1

# Power management (no displays/RGB)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=10800000
CONFIG_ZMK_PM_SOFT_OFF=y
